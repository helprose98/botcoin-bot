services:

  btc-bot:
    build: .
    container_name: kraken-btc-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  botapi:
    build: ./botapi
    container_name: kraken-btc-botapi
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./VERSION:/app/VERSION:ro
      - ./update.sh:/app/update.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
